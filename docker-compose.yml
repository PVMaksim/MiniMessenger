# docker-compose.yml — финальная продакшен конфигурация
#
# Сервисы:
#   postgres  — база данных
#   redis     — кэш и онлайн-статусы
#   backend   — Node.js API + Socket.io
#   frontend  — собранный React (статика)
#   nginx     — обратный прокси, SSL, раздача фронта
#
# Запуск:
#   docker compose up -d --build

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mm_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL-схема выполняется автоматически при первом запуске
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # В продакшене порт не открываем наружу — только внутри Docker-сети
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mm_redis
    restart: always
    # Пароль на Redis — важно для продакшена
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: mm_backend
    restart: always
    env_file: ./backend/.env
    environment:
      # Переопределяем хосты — внутри Docker используем имена сервисов
      DB_HOST:    postgres
      REDIS_HOST: redis
      NODE_ENV:   production
    volumes:
      # Загруженные файлы хранятся вне контейнера — не теряются при пересборке
      - uploads_data:/app/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

  # ── Frontend (React → статика) ───────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: mm_frontend
    restart: always
    networks:
      - internal
    # Frontend не экспонирует порты — nginx забирает статику напрямую

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mm_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Статика фронтенда (собирается в образе frontend)
      - frontend_static:/var/www/frontend:ro
      # SSL-сертификаты Let's Encrypt
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Папка для верификации certbot
      - certbot_www:/var/www/certbot:ro
      # Загруженные файлы (те же, что у backend)
      - uploads_data:/var/www/uploads:ro
    networks:
      - internal
      - external
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3

  # ── Certbot (обновление SSL) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: mm_certbot
    restart: "no"   # запускается вручную или по cron
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

# ── Сети ────────────────────────────────────────────────────────────────────
networks:
  internal:   # только между контейнерами
    driver: bridge
  external:   # nginx → интернет
    driver: bridge

# ── Тома ─────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:    # данные PostgreSQL
  redis_data:       # данные Redis
  uploads_data:     # загруженные пользователями файлы
  frontend_static:  # собранный React
  certbot_www:      # для верификации Let's Encrypt
