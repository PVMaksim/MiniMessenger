# nginx/nginx.conf
#
# Схема трафика:
#
#   Браузер/приложение
#       │
#       ▼
#   nginx :80  ──► redirect ──► nginx :443
#       │
#   nginx :443
#       ├─ /api/*       ──► backend:4000  (REST API)
#       ├─ /socket.io/* ──► backend:4000  (WebSocket)
#       ├─ /uploads/*   ──► backend:4000  (загруженные файлы)
#       └─ /*           ──► /var/www/frontend/index.html  (React SPA)

# Количество рабочих процессов = числу CPU
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Эффективная отдача файлов
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Сжатие текстового контента (JS, CSS, JSON)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Таймауты для WebSocket (Socket.io держит соединение открытым)
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # Ограничение размера тела запроса (для загрузки файлов — 25 МБ)
    client_max_body_size 25M;

    # ─── Апстрим — наш Node.js бэкенд ──────────────────────────────────────
    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS редирект ───────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN;   # ← замени на свой домен или IP

        # Let's Encrypt использует этот путь для верификации домена
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS сервер ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name YOUR_DOMAIN;   # ← замени на свой домен или IP

        # SSL-сертификаты от Let's Encrypt (certbot)
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Современные настройки TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           DENY                                  always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

        # ── REST API ────────────────────────────────────────────────────────
        location /api/ {
            # Убираем /api префикс перед проксированием
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (Socket.io) ────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            # Обязательно для WebSocket
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Отключаем буферизацию — критично для real-time
            proxy_buffering    off;
        }

        # ── Загруженные файлы ───────────────────────────────────────────────
        location /uploads/ {
            proxy_pass       http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # Кэшируем файлы у клиента на 7 дней
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ── React SPA (всё остальное) ────────────────────────────────────────
        location / {
            root  /var/www/frontend;
            index index.html;
            # Для React Router — неизвестные пути отдаём index.html
            try_files $uri $uri/ /index.html;
            # HTML не кэшируем (чтобы деплой обновлений работал)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Health check без логов ───────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }
    }
}
